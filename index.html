<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西暦・和暦変換ツール</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="apple-touch-icon.png">
  <style>
    html { font-size: 18px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic UI', Meiryo, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      padding: 36px 16px 60px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 4px;
      letter-spacing: 0.06em;
    }
    .subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 32px;
    }

    .outer {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 上段：変換カード(広め) + 享年カード */
    .top-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 20px;
    }
    @media (max-width: 680px) {
      .top-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px 22px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4a7bd4;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: #4a7bd4;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* 変換カード内の2カラム */
    .conv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }
    @media (max-width: 480px) {
      .conv-grid { grid-template-columns: 1fr; }
    }
    .conv-half {
      /* 境界線は右半分だけ左ボーダーで表現 */
    }
    .conv-half + .conv-half {
      border-left: 1px solid #eef;
      padding-left: 20px;
    }
    @media (max-width: 480px) {
      .conv-half + .conv-half {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid #eef;
        padding-top: 16px;
        margin-top: 8px;
      }
    }
    .conv-subtitle {
      font-size: 0.78rem;
      font-weight: 700;
      color: #4a7070;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .row-label {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 5px;
      margin-top: 12px;
    }
    .row-label:first-of-type { margin-top: 0; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    input[type="number"] {
      width: 88px;
      padding: 8px 10px;
      border: 1.5px solid #dde;
      border-radius: 7px;
      font-size: 0.95rem;
      font-family: inherit;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: #4a7bd4; }
    input::placeholder { color: #ccc; }

    select {
      padding: 8px 7px;
      border: 1.5px solid #dde;
      border-radius: 7px;
      font-size: 0.8rem;
      font-family: inherit;
      background: #fff;
      outline: none;
      cursor: pointer;
      max-width: 100%;
      transition: border-color 0.15s;
      color: #333;
    }
    select:focus { border-color: #4a7bd4; }

    .unit {
      color: #444;
      font-size: 0.88rem;
    }

    .result-box {
      margin-top: 12px;
      padding: 11px 14px;
      background: #f2f6ff;
      border: 1px solid #dce8ff;
      border-radius: 9px;
      min-height: 46px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e3a6e;
      display: flex;
      align-items: center;
    }
    .result-box.empty {
      font-size: 0.78rem;
      font-weight: 400;
      color: #bbb;
    }
    .result-box.error {
      background: #fff5f5;
      border-color: #ffd0d0;
      color: #c33;
      font-size: 0.78rem;
      font-weight: 400;
    }
    .result-box.multiline {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .result-main { font-size: 1.1rem; font-weight: 700; }
    .result-sub  { font-size: 0.8rem; font-weight: 400; color: #2a5a9a; }

    .hint {
      margin-top: 6px;
      font-size: 0.71rem;
      color: #777;
      min-height: 14px;
      line-height: 1.5;
    }
    .hint.note { color: #3a8a5a; }

    /* ─── 下段：年代別人物 ─── */
    .history-card .card-title::before { background: #7a5dd4; }
    .history-card .card-title { color: #7a5dd4; }

    .history-desc {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .history-year-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .history-year-row input { width: 110px; font-size: 1rem; }

    .hist-table { display: table; width: 100%; border-collapse: collapse; }
    .hist-row   { display: table-row; }
    .hist-label, .hist-value {
      display: table-cell;
      padding: 9px 14px;
      border-bottom: 1px solid #eef;
      vertical-align: middle;
    }
    .hist-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      white-space: nowrap;
      width: 120px;
    }
    .hist-value { font-size: 0.92rem; color: #2c3e50; }
    .hist-value.muted  { color: #999; font-size: 0.82rem; }
    .hist-value.multi  { line-height: 1.7; }
    .hist-row:last-child .hist-label,
    .hist-row:last-child .hist-value { border-bottom: none; }
    .tag-change { font-size: 0.7rem; color: #c88; margin-left: 4px; }
    .hist-sep .hist-label,
    .hist-sep .hist-value {
      border-top: 2px solid #eef;
      padding-top: 14px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<h1>西暦・和暦変換ツール</h1>
<p class="subtitle">慶長（1596年）〜令和まで対応 ／ 江戸時代・明治以降すべての元号</p>

<div class="outer">

  <!-- ── 上段 ── -->
  <div class="top-grid">

    <!-- 西暦 ↔ 和暦（1枚にまとめ） -->
    <div class="card">
      <div class="card-title">西暦 ↔ 和暦</div>
      <div class="conv-grid">

        <!-- 西暦 → 和暦 -->
        <div class="conv-half">
          <div class="conv-subtitle">西暦 → 和暦</div>
          <div class="input-row">
            <input type="number" id="seireki-input" placeholder="例：2024" min="1596" max="2999">
            <span class="unit">年</span>
          </div>
          <div class="result-box empty" id="wareki-result">ここに表示</div>
          <div class="hint" id="wareki-hint"></div>
        </div>

        <!-- 和暦 → 西暦 -->
        <div class="conv-half">
          <div class="conv-subtitle">和暦 → 西暦</div>
          <div class="input-row">
            <select id="gengo-select"></select>
            <input type="number" id="wareki-input" placeholder="例：6" min="1">
            <span class="unit">年</span>
          </div>
          <div class="result-box empty" id="seireki-result">ここに表示</div>
          <div class="hint" id="seireki-hint"></div>
        </div>

      </div><!-- /conv-grid -->
    </div><!-- /変換カード -->

    <!-- 享年計算 -->
    <div class="card">
      <div class="card-title">享年計算</div>
      <div class="row-label">生年</div>
      <div class="input-row">
        <select id="birth-era"></select>
        <input type="number" id="birth-year" placeholder="例：5" min="1">
        <span class="unit">年</span>
      </div>
      <div class="row-label">没年</div>
      <div class="input-row">
        <select id="death-era"></select>
        <input type="number" id="death-year" placeholder="例：10" min="1">
        <span class="unit">年</span>
      </div>
      <div class="result-box multiline empty" id="enjyu-result">生年・没年を入力してください</div>
      <div class="hint" id="enjyu-hint"></div>
    </div>

  </div><!-- /top-grid -->

  <!-- ── 下段：年代別人物 ── -->
  <div class="card history-card">
    <div class="card-title">年代別 人物一覧</div>
    <p class="history-desc">
      西暦年を入力すると、その年の徳川将軍（〜1868年）・天皇・内閣総理大臣（1885年〜）を表示します。
      改元年や交代年は複数名が表示される場合があります。
    </p>
    <div class="history-year-row">
      <input type="number" id="history-year" placeholder="例：1840" min="1596" max="2999">
      <span class="unit">年</span>
    </div>
    <div class="hist-table">
      <div class="hist-row">
        <div class="hist-label">徳川将軍</div>
        <div class="hist-value muted" id="hist-shogun">─</div>
      </div>
      <div class="hist-row">
        <div class="hist-label">天　　皇</div>
        <div class="hist-value muted" id="hist-emperor">─</div>
      </div>
      <div class="hist-row">
        <div class="hist-label">内閣総理大臣</div>
        <div class="hist-value muted" id="hist-pm">─</div>
      </div>
      <div class="hist-row hist-sep">
        <div class="hist-label">干支</div>
        <div class="hist-value muted" id="hist-junishi">─</div>
      </div>
      <div class="hist-row">
        <div class="hist-label">十干</div>
        <div class="hist-value muted" id="hist-jikkan">─</div>
      </div>
      <div class="hist-row">
        <div class="hist-label">六十干支</div>
        <div class="hist-value muted" id="hist-kanshi">─</div>
      </div>
    </div>
  </div>

</div><!-- /outer -->

<script>
// ─── 元号データ ───
const eras = [
  { name: '慶長', start: 1596 }, { name: '元和', start: 1615 },
  { name: '寛永', start: 1624 }, { name: '正保', start: 1644 },
  { name: '慶安', start: 1648 }, { name: '承応', start: 1652 },
  { name: '明暦', start: 1655 }, { name: '万治', start: 1658 },
  { name: '寛文', start: 1661 }, { name: '延宝', start: 1673 },
  { name: '天和', start: 1681 }, { name: '貞享', start: 1684 },
  { name: '元禄', start: 1688 }, { name: '宝永', start: 1704 },
  { name: '正徳', start: 1711 }, { name: '享保', start: 1716 },
  { name: '元文', start: 1736 }, { name: '寛保', start: 1741 },
  { name: '延享', start: 1744 }, { name: '寛延', start: 1748 },
  { name: '宝暦', start: 1751 }, { name: '明和', start: 1764 },
  { name: '安永', start: 1772 }, { name: '天明', start: 1781 },
  { name: '寛政', start: 1789 }, { name: '享和', start: 1801 },
  { name: '文化', start: 1804 }, { name: '文政', start: 1818 },
  { name: '天保', start: 1830 }, { name: '弘化', start: 1844 },
  { name: '嘉永', start: 1848 }, { name: '安政', start: 1854 },
  { name: '万延', start: 1860 }, { name: '文久', start: 1861 },
  { name: '元治', start: 1864 }, { name: '慶応', start: 1865 },
  { name: '明治', start: 1868 }, { name: '大正', start: 1912 },
  { name: '昭和', start: 1926 }, { name: '平成', start: 1989 },
  { name: '令和', start: 2019 },
];

const LAST = eras.length - 1;

function getEndYear(i) {
  return i < LAST ? eras[i + 1].start : 2999;
}
function getMaxEraYear(i) {
  return i < LAST ? getEndYear(i) - eras[i].start + 1 : null;
}

function buildEraSelect(el, compact = false) {
  [...eras].reverse().forEach((era, ri) => {
    const i = LAST - ri;
    const opt = document.createElement('option');
    opt.value = era.name;
    if (compact) {
      opt.textContent = era.name;
    } else {
      const endY = getEndYear(i);
      const endLabel = i === LAST ? '現在' : String(endY);
      opt.textContent = `${era.name}（${era.start}〜${endLabel}）`;
    }
    el.appendChild(opt);
  });
}
buildEraSelect(document.getElementById('gengo-select'), true); // 元号名のみ（ヒントに年範囲表示済み）
buildEraSelect(document.getElementById('birth-era'));
buildEraSelect(document.getElementById('death-era'));

// ─── 西暦 → 和暦 ───
function convertSeireki() {
  const val = document.getElementById('seireki-input').value.trim();
  const resultEl = document.getElementById('wareki-result');
  const hintEl   = document.getElementById('wareki-hint');

  if (!val) {
    resultEl.textContent = 'ここに表示';
    resultEl.className = 'result-box empty';
    hintEl.textContent = '';
    return;
  }
  const year = parseInt(val, 10);
  if (isNaN(year) || year < 1596) {
    resultEl.textContent = '1596年以降を入力してください';
    resultEl.className = 'result-box error';
    hintEl.textContent = '';
    return;
  }

  const matches = [];
  for (let i = 0; i < eras.length; i++) {
    if (year >= eras[i].start && year <= getEndYear(i)) {
      const ey = year - eras[i].start + 1;
      matches.push(`${eras[i].name}${ey === 1 ? '元' : ey}年`);
    }
  }

  if (matches.length === 0) {
    resultEl.textContent = '該当なし';
    resultEl.className = 'result-box error';
    hintEl.textContent = '';
  } else {
    resultEl.textContent = matches.join(' または ');
    resultEl.className = 'result-box';
    hintEl.textContent = matches.length > 1 ? '※ 改元年のためどちらも正しい' : '';
    hintEl.className = matches.length > 1 ? 'hint note' : 'hint';
  }
}

// ─── 和暦 → 西暦 ───
const gengoSelect = document.getElementById('gengo-select');
function convertWareki() {
  const eraName  = gengoSelect.value;
  const val      = document.getElementById('wareki-input').value.trim();
  const resultEl = document.getElementById('seireki-result');
  const hintEl   = document.getElementById('seireki-hint');

  const idx      = eras.findIndex(e => e.name === eraName);
  const maxYear  = getMaxEraYear(idx);
  const endY     = getEndYear(idx);
  hintEl.textContent = maxYear !== null
    ? `${eras[idx].name}は1〜${maxYear}年（${eras[idx].start}〜${endY}年）`
    : `${eras[idx].name}は1年〜（現在進行中）`;
  hintEl.className = 'hint';

  if (!val) {
    resultEl.textContent = 'ここに表示';
    resultEl.className = 'result-box empty';
    return;
  }
  const ey = parseInt(val, 10);
  if (isNaN(ey) || ey < 1) {
    resultEl.textContent = '正しい年を入力してください';
    resultEl.className = 'result-box error';
    return;
  }
  if (maxYear !== null && ey > maxYear) {
    resultEl.textContent = `${eras[idx].name}は${maxYear}年が最後です`;
    resultEl.className = 'result-box error';
    return;
  }
  resultEl.textContent = `${eras[idx].start + ey - 1}年`;
  resultEl.className = 'result-box';
}

// ─── 享年計算 ───
function eraToSeireki(eraName, ey) {
  const idx = eras.findIndex(e => e.name === eraName);
  if (idx < 0 || ey < 1) return null;
  const maxY = getMaxEraYear(idx);
  if (maxY !== null && ey > maxY) return null;
  return eras[idx].start + ey - 1;
}

function computeEnjyu() {
  const birthEra = document.getElementById('birth-era').value;
  const birthVal = document.getElementById('birth-year').value.trim();
  const deathEra = document.getElementById('death-era').value;
  const deathVal = document.getElementById('death-year').value.trim();
  const resultEl = document.getElementById('enjyu-result');
  const hintEl   = document.getElementById('enjyu-hint');

  if (!birthVal || !deathVal) {
    resultEl.textContent = '生年・没年を入力してください';
    resultEl.className = 'result-box multiline empty';
    hintEl.textContent = '';
    return;
  }

  const birthSei = eraToSeireki(birthEra, parseInt(birthVal, 10));
  const deathSei = eraToSeireki(deathEra, parseInt(deathVal, 10));

  if (birthSei === null) {
    resultEl.textContent = '生年の入力が正しくありません';
    resultEl.className = 'result-box error multiline';
    hintEl.textContent = '';
    return;
  }
  if (deathSei === null) {
    resultEl.textContent = '没年の入力が正しくありません';
    resultEl.className = 'result-box error multiline';
    hintEl.textContent = '';
    return;
  }
  if (deathSei < birthSei) {
    resultEl.textContent = '没年が生年より前になっています';
    resultEl.className = 'result-box error multiline';
    hintEl.textContent = '';
    return;
  }

  const diff   = deathSei - birthSei;
  const kazoue = diff + 1;
  // 満年齢：没年に誕生日を迎えていれば diff歳、迎えていなければ diff-1歳
  const manLow  = Math.max(0, diff - 1);
  const manHigh = diff;

  const birthLabel = `${birthEra}${parseInt(birthVal, 10)}年（西暦${birthSei}年）`;
  const deathLabel = `${deathEra}${parseInt(deathVal, 10)}年（西暦${deathSei}年）`;

  const manText = manLow === manHigh ? `${manLow}` : `${manLow} または ${manHigh}`;
  resultEl.className = 'result-box multiline';
  resultEl.innerHTML = `
    <span class="result-main">満 ${manText} 歳</span>
    <span class="result-sub">享年 ${kazoue} 歳（数え年）</span>
    <span class="result-sub">${birthLabel} 〜 ${deathLabel}</span>
  `;
  hintEl.className = 'hint';
  hintEl.textContent = diff === 0
    ? '※ 生没年が同じ年のため満0歳です'
    : `※ 満年齢は没年に誕生日を迎えていれば ${manHigh} 歳、迎えていなければ ${manLow} 歳になります`;
}

// イベント
document.getElementById('seireki-input').addEventListener('input', convertSeireki);
gengoSelect.addEventListener('change', function () {
  document.getElementById('wareki-input').value = '';
  document.getElementById('seireki-result').textContent = 'ここに表示';
  document.getElementById('seireki-result').className = 'result-box empty';
  convertWareki();
});
document.getElementById('wareki-input').addEventListener('input', convertWareki);
['birth-era','birth-year','death-era','death-year'].forEach(id =>
  document.getElementById(id).addEventListener(
    id.endsWith('-era') ? 'change' : 'input', computeEnjyu
  )
);
convertWareki();

// ═══════════════════════════════════════
//  年代別人物データ
// ═══════════════════════════════════════

const shoguns = [
  { name: '初代 徳川家康',   start: 1603, end: 1605 },
  { name: '第2代 徳川秀忠', start: 1605, end: 1623 },
  { name: '第3代 徳川家光', start: 1623, end: 1651 },
  { name: '第4代 徳川家綱', start: 1651, end: 1680 },
  { name: '第5代 徳川綱吉', start: 1680, end: 1709 },
  { name: '第6代 徳川家宣', start: 1709, end: 1712 },
  { name: '第7代 徳川家継', start: 1712, end: 1716 },
  { name: '第8代 徳川吉宗', start: 1716, end: 1745 },
  { name: '第9代 徳川家重', start: 1745, end: 1760 },
  { name: '第10代 徳川家治', start: 1760, end: 1786 },
  { name: '第11代 徳川家斉', start: 1787, end: 1837 },
  { name: '第12代 徳川家慶', start: 1837, end: 1853 },
  { name: '第13代 徳川家定', start: 1853, end: 1858 },
  { name: '第14代 徳川家茂', start: 1858, end: 1866 },
  { name: '第15代 徳川慶喜', start: 1867, end: 1868 },
];

const emperors = [
  { name: '後陽成天皇', start: 1586, end: 1611 },
  { name: '後水尾天皇', start: 1611, end: 1629 },
  { name: '明正天皇',   start: 1629, end: 1643 },
  { name: '後光明天皇', start: 1643, end: 1654 },
  { name: '後西天皇',   start: 1654, end: 1663 },
  { name: '霊元天皇',   start: 1663, end: 1687 },
  { name: '東山天皇',   start: 1687, end: 1709 },
  { name: '中御門天皇', start: 1709, end: 1735 },
  { name: '桜町天皇',   start: 1735, end: 1747 },
  { name: '桃園天皇',   start: 1747, end: 1762 },
  { name: '後桜町天皇', start: 1762, end: 1771 },
  { name: '後桃園天皇', start: 1771, end: 1779 },
  { name: '光格天皇',   start: 1779, end: 1817 },
  { name: '仁孝天皇',   start: 1817, end: 1846 },
  { name: '孝明天皇',   start: 1846, end: 1867 },
  { name: '明治天皇',   start: 1867, end: 1912 },
  { name: '大正天皇',   start: 1912, end: 1926 },
  { name: '昭和天皇',   start: 1926, end: 1989 },
  { name: '上皇陛下（明仁）', start: 1989, end: 2019 },
  { name: '今上天皇（徳仁）', start: 2019, end: 2999 },

function filterByYear(arr, year) {
  return arr.filter(r => year >= r.start && year <= r.end);
}

// ─── 干支・十干 ───
const JIKKAN       = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const JIKKAN_YOMI  = ['きのえ','きのと','ひのえ','ひのと','つちのえ','つちのと','かのえ','かのと','みずのえ','みずのと'];
const JUNISHI      = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JUNISHI_YOMI = ['ね','うし','とら','う','たつ','み','うま','ひつじ','さる','とり','いぬ','い'];
const JUNISHI_ANI  = ['鼠','牛','虎','兎','龍','蛇','馬','羊','猿','鶏','犬','猪'];

function getKanshi(year) {
  const k = ((year - 4) % 10 + 10) % 10;
  const s = ((year - 4) % 12 + 12) % 12;
  return {
    junishi: `${JUNISHI[s]}（${JUNISHI_YOMI[s]}）`,
    jikkan:  `${JIKKAN[k]}（${JIKKAN_YOMI[k]}）`,
    kanshi:  `${JIKKAN[k]}${JUNISHI[s]}（${JIKKAN_YOMI[k]}の${JUNISHI_YOMI[s]}）`,
  };
}

function updateHistory() {
  const val = document.getElementById('history-year').value.trim();
  const shogunEl   = document.getElementById('hist-shogun');
  const emperorEl  = document.getElementById('hist-emperor');
  const pmEl       = document.getElementById('hist-pm');
  const junishiEl  = document.getElementById('hist-junishi');
  const jikkanEl   = document.getElementById('hist-jikkan');
  const kanshiEl   = document.getElementById('hist-kanshi');

  function reset(el) { el.textContent = '─'; el.className = 'hist-value muted'; }

  if (!val) { [shogunEl, emperorEl, pmEl, junishiEl, jikkanEl, kanshiEl].forEach(reset); return; }

  const year = parseInt(val, 10);
  if (isNaN(year) || year < 1596 || year > 2999) {
    [shogunEl, emperorEl, pmEl, junishiEl, jikkanEl, kanshiEl].forEach(el => {
      el.textContent = '範囲外';
      el.className = 'hist-value muted';
    });
    return;
  }

  // 干支・十干（任意の年で計算可能）
  const ks = getKanshi(year);
  junishiEl.textContent = ks.junishi; junishiEl.className = 'hist-value';
  jikkanEl.textContent  = ks.jikkan;  jikkanEl.className  = 'hist-value';
  kanshiEl.textContent  = ks.kanshi;  kanshiEl.className  = 'hist-value';

  // 将軍
  if (year < 1603) {
    shogunEl.textContent = '（徳川幕府開設前）';
    shogunEl.className = 'hist-value muted';
  } else if (year > 1868) {
    shogunEl.textContent = '（明治維新後）';
    shogunEl.className = 'hist-value muted';
  } else {
    const found = filterByYear(shoguns, year);
    if (found.length) {
      shogunEl.textContent = found.map(r => r.name).join(' → ');
      shogunEl.className = found.length > 1 ? 'hist-value multi' : 'hist-value';
      if (found.length > 1) shogunEl.innerHTML += '<span class="tag-change">交代あり</span>';
    } else {
      shogunEl.textContent = '（記録なし）';
      shogunEl.className = 'hist-value muted';
    }
  }

  // 天皇
  {
    const found = filterByYear(emperors, year);
    if (found.length) {
      emperorEl.textContent = found.map(r => r.name).join(' → ');
      emperorEl.className = found.length > 1 ? 'hist-value multi' : 'hist-value';
      if (found.length > 1) emperorEl.innerHTML += '<span class="tag-change">代替わり</span>';
    } else {
      emperorEl.textContent = '（範囲外）';
      emperorEl.className = 'hist-value muted';
    }
  }

  // 総理大臣
  if (year < 1885) {
    pmEl.textContent = '（内閣制度発足前・1885年〜）';
    pmEl.className = 'hist-value muted';
  } else {
    const found = filterByYear(pms, year);
    if (found.length) {
      pmEl.textContent = found.map(r => r.name).join(' → ');
      pmEl.className = found.length > 1 ? 'hist-value multi' : 'hist-value';
      if (found.length > 1) pmEl.innerHTML += '<span class="tag-change">交代あり</span>';
    } else {
      pmEl.textContent = '（記録なし）';
      pmEl.className = 'hist-value muted';
    }
  }
}

document.getElementById('history-year').addEventListener('input', updateHistory);
